services:
  api:
    build: .
    container_name: flask
    ports:
      - "5000:5000"
    environment:
      - ACTISCAN_API_BASE=http://host.docker.internal:8001/api
      - ACTISCAN_API_V1_BASE=http://host.docker.internal:8001/api/v1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./:/app
