{% extends "base_admin.html" %}

{% block title %}Gestion de Usuarios - ActiScan{% endblock %}
{% block page %}usuarios{% endblock %}
{% block nav_usuarios %}active{% endblock %}

{% block content %}
<div class="user-header">
    <div>
        <h1 class="page-title" style="margin-bottom:0;">Usuarios</h1>
    </div>
    <a href="{{ url_for('registrar_usuario') }}">
        <button class="new-user-btn" type="button">+ NUEVO USUARIO</button>
    </a>
</div>

<div class="table-card">
    <div class="table-tools" style="grid-template-columns: 3fr auto;">
        <input class="auth-input" id="usuariosSearch" type="text" placeholder="Filtrar por nombre o correo..." style="margin:0;">
        <button class="filter-btn" id="usuariosApplyFilter" type="button">Aplicar filtro</button>
    </div>

    <table class="simple-table">
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Correo</th>
                <th>Rol</th>
                <th>Estado</th>
                <th>Opciones</th>
            </tr>
        </thead>
        <tbody id="usuariosTableBody">
            <tr><td colspan="5" style="text-align:center;color:#aaa;padding:24px;">Cargando...</td></tr>
        </tbody>
    </table>
</div>
{% endblock %}
