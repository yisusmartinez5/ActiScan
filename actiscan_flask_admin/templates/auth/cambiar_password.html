{% extends "base_auth.html" %}

{% block title %}Cambiar contrasena - ActiScan{% endblock %}
{% block page %}cambiar-password{% endblock %}

{% block content %}
<div class="auth-card auth-mini-card">
    <div class="auth-mini-icon">
        <i class="fa-solid fa-lock"></i>
    </div>

    <h1 class="auth-mini-title">Cambiar contrasena</h1>
    <p class="auth-mini-text">
        Introduce tu contrasena actual y la nueva contrasena para confirmar el cambio.
    </p>

    <form id="passwordForm">
        <label class="auth-label" style="display:block;text-align:left;">Contrasena actual</label>
        <input class="auth-input" id="currentPassword" type="password" placeholder="Contrasena actual">

        <label class="auth-label" style="display:block;text-align:left;">Nueva contrasena</label>
        <input class="auth-input" id="newPassword" type="password" placeholder="Nueva contrasena">

        <label class="auth-label" style="display:block;text-align:left;">Confirmar contrasena</label>
        <input class="auth-input" id="confirmPassword" type="password" placeholder="Confirmar nueva contrasena">

        <p id="passwordMessage" style="font-size:.85rem;min-height:18px;margin-bottom:8px;"></p>

        <div class="auth-actions">
            <a href="{{ url_for('dashboard') }}">
                <button class="btn-secondary" type="button">Cancelar</button>
            </a>
            <button class="btn-primary" id="savePasswordBtn" type="submit">Guardar cambio</button>
        </div>
    </form>
</div>
{% endblock %}
