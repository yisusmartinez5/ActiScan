{% extends "base_auth.html" %}

{% block title %}Cambiar contraseña{% endblock %}

{% block content %}
<div class="auth-card auth-mini-card">
    <div class="auth-mini-icon">
        <i class="fa-solid fa-lock"></i>
    </div>

    <h1 class="auth-mini-title">Cambiar contraseña</h1>
    <p class="auth-mini-text">
        Introduce tu nueva contraseña y confirma el cambio.
    </p>

    <label class="auth-label" style="display:block; text-align:left;">Nueva contraseña</label>
    <input class="auth-input" type="password" placeholder="••••••••">

    <label class="auth-label" style="display:block; text-align:left;">Confirmar contraseña</label>
    <input class="auth-input" type="password" placeholder="••••••••">

    <div class="auth-actions">
        <a href="{{ url_for('login') }}">
            <button class="btn-primary">Guardar cambio</button>
        </a>
    </div>
</div>
{% endblock %}
