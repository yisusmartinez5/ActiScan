{% extends "base_auth.html" %}

{% block title %}Login - ActiScan{% endblock %}

{% block content %}
<div class="auth-card login-card">
    <div class="login-left">
        <div class="logo-mark">
            <div class="logo-square">A</div>
            <div class="logo-square">▦</div>
            <div class="logo-square">S</div>
            <div class="logo-square icon"><i class="fa-solid fa-magnifying-glass"></i></div>
        </div>
        <h1 class="logo-title">ActiScan</h1>
        <p class="logo-subtitle">GESTIÓN DE ACTIVOS</p>
    </div>

    <div class="login-right">
        <div class="auth-icon-circle">
            <i class="fa-regular fa-user"></i>
        </div>

        <h1 class="auth-title">Bienvenido</h1>
        <p class="auth-subtitle">Iniciar sesión</p>

        <label class="auth-label">Usuario</label>
        <input class="auth-input" type="text" value="admin@actiscan.com">

        <label class="auth-label">Contraseña</label>
        <input class="auth-input" type="password" value="123456">

        <div class="auth-row">
            <a class="auth-link" href="{{ url_for('recuperar_password') }}">Olvidé contraseña</a>
            <a href="{{ url_for('dashboard') }}">
                <button class="btn-primary">Entrar</button>
            </a>
        </div>
    </div>
</div>
{% endblock %}
