{% extends "base_auth.html" %}

{% block title %}Recuperar contraseña{% endblock %}

{% block content %}
<div class="auth-card auth-mini-card">
    <div class="auth-mini-icon">
        <i class="fa-solid fa-arrow-rotate-left"></i>
    </div>

    <h1 class="auth-mini-title">¿Olvidaste tu contraseña?</h1>
    <p class="auth-mini-text">
        Introduce tu correo de la empresa para enviarte un código de seguridad.
    </p>

    <label class="auth-label" style="display:block; text-align:left;">Email</label>
    <input class="auth-input" type="email" placeholder="ejemplo@empresa.com">

    <div class="auth-actions">
        <a href="{{ url_for('login') }}">
            <button class="btn-secondary">Regresar</button>
        </a>
        <a href="{{ url_for('verificar_codigo') }}">
            <button class="btn-primary">Continuar</button>
        </a>
    </div>
</div>
{% endblock %}
