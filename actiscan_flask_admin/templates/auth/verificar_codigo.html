    </div>

    <p class="auth-mini-text" style="margin-bottom: 12px;">

        <input class="code-input" type="text" maxlength="1">
        <input class="code-input" type="text" maxlength="1">
        <input class="code-input" type="text" maxlength="1">
        <input class="code-input" type="text" maxlength="1">
        <input class="code-input" type="text" maxlength="1">
        <input class="code-input" type="text" maxlength="1">

    <a href="{{ url_for('cambiar_password') }}">

    </a>
</div>
{% endblock %}
